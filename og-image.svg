<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#fafafa"/>
  <rect width="1200" height="630" fill="url(#grad)" opacity="0.05"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#666666"/>
    </linearGradient>
  </defs>

  <!-- Logo area -->
  <text x="600" y="200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="72" font-weight="200" fill="#1a1a1a" text-anchor="middle"
        letter-spacing="16">MIRASUIT</text>

  <text x="600" y="260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="18" fill="#999999" text-anchor="middle" letter-spacing="4" text-transform="uppercase">YOUR STYLE IDENTITY</text>

  <!-- Divider -->
  <line x1="500" y1="300" x2="700" y2="300" stroke="#e8e8e8" stroke-width="1"/>

  <!-- Tagline -->
  <text x="600" y="360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="28" fill="#1a1a1a" text-anchor="middle" font-weight="300">Discover your personal style</text>

  <!-- Features -->
  <text x="600" y="420" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="18" fill="#666666" text-anchor="middle" font-weight="300">AI · MBTI · Smart Menswear · 智能穿搭</text>

  <!-- Suit icon -->
  <text x="600" y="520" font-size="80" text-anchor="middle" opacity="0.15">👔</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#1a1a1a"/>
  <text x="600" y="612" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="14" fill="#ffffff" text-anchor="middle" letter-spacing="2" opacity="0.7">NO ACCOUNT REQUIRED · DATA STAYS ON DEVICE</text>
</svg>
